version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: cvstudio-postgres
    environment:
      POSTGRES_DB: cvstudio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cvstudio-postgres-data:/var/lib/postgresql/data

volumes:
  cvstudio-postgres-data:

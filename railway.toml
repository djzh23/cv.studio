[build]
builder = "NIXPACKS"
buildCommand = "dotnet publish src/CvStudio.Api/CvStudio.Api.csproj -c Release -o out"

[deploy]
startCommand = "ASPNETCORE_URLS=http://0.0.0.0:$PORT dotnet out/CvStudio.Api.dll"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
